{{ define "main" }}
<main class="linkedin-warning enter" aria-labelledby="linkedin-warning-title">
    <div class="linkedin-warning-mark" aria-hidden="true">
        <span>!</span>
    </div>
    <h1 id="linkedin-warning-title">Before LinkedIn</h1>
    <p>
        LinkedIn is a garbage platform overrun by bots and charlatans.
    </p>
    <p>
        Nonetheless, my profile exists, mostly because I lack the spine to delete it entirely.
    </p>
    <div class="linkedin-warning-actions">
        <a class="linkedin-warning-primary" href="https://linkedin.com/in/rybkr" target="_blank" rel="noopener">Continue anyway</a>
        <a class="linkedin-warning-secondary" href="/">Return</a>
    </div>
</main>
{{ end }}
