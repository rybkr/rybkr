{{ define "main" }}
<main id="search-page">
    {{ partial "breadcrumbs.html" . }}
    <div class="page-header enter">
        <h1>{{ .Title }}</h1>
    </div>
    <input
        id="live-search"
        type="search"
        placeholder="Filter results…"
        aria-label="Filter results"
        class="search-filter"
    />
    {{ .Content }}
</main>
<script src="/js/search-filter.js"></script>
{{ end }}
